name = "Drogon CSP"
grammar = "csp"
path_suffixes = ["csp"]
line_comments = []
autoclose_before = ";:.,=}])>\" "
brackets = [
  { start = "{",  end = "}",  close = true, newline = true },
  { start = "[",  end = "]",  close = true, newline = true },
  { start = "(",  end = ")",  close = true, newline = true },
  { start = "<%", end = "%>", close = true, newline = false },
  { start = "[[", end = "]]", close = true, newline = false },
  { start = "{%", end = "%}", close = true, newline = false },
  { start = "\"", end = "\"", close = true, newline = false },
  { start = "'",  end = "'",  close = true, newline = false },
]
